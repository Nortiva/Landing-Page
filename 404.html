<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 • Página não encontrada | Nortiva</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/404.css">
</head>
<body>

    <div class="blur blur-left"></div>
    <div class="blur blur-right"></div>

    <main class="container">

        <span class="badge">ERRO 404</span>

        <h1>Página não encontrada.</h1>

        <p>
            A página que você tentou acessar não existe,
            foi movida ou nunca esteve por aqui.
        </p>

        <div class="buttons">

            <a href="index.html" class="primary">
                Voltar ao início
            </a>

            <a href="javascript:history.back()" class="secondary">
                Página anterior
            </a>

        </div>

    </main>

</body>
</html>
